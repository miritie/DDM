# /etc/nginx/sites-available/ddm
# Reverse proxy : http://204.168.150.125/ddm  →  container ddm-app sur :3001
# L'app Next.js n'a pas de basePath ; nginx réécrit l'URL.
#
# Active : sudo ln -s /etc/nginx/sites-available/ddm /etc/nginx/sites-enabled/
#         sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    client_max_body_size 20M;

    # Logs
    access_log /var/log/nginx/ddm-access.log;
    error_log  /var/log/nginx/ddm-error.log;

    # Page d'accueil hors /ddm — redirige vers /ddm
    location = / {
        return 302 /ddm/auth/login;
    }

    # ----------------------------------------------------------------
    # /ddm/* → strip et forward vers Next.js
    location /ddm/ {
        rewrite ^/ddm/(.*)$ /$1 break;
        rewrite ^/ddm$ / break;

        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        # Sockets WebSocket (HMR ; pas critique en prod)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # ----------------------------------------------------------------
    # Assets Next.js (chunks, CSS, fonts, images optimisées) — chargés par les
    # pages /ddm/* mais demandés par le navigateur à la racine /_next/*
    location /_next/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;

        # Long cache sur les assets immutables hashés
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ----------------------------------------------------------------
    # API routes — appelées via fetch('/api/...') depuis les pages /ddm/*
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # ----------------------------------------------------------------
    # Pages publiques (scan QR client) sans /ddm
    location /scan/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /uploads/ {
        proxy_pass http://127.0.0.1:3001;
        expires 30d;
    }
}
