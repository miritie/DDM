name: Build & Deploy

# Déclenché à chaque push sur main, ou manuellement.
# Les pull requests passent uniquement le job qualité (pas de build/deploy).
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ---------------------------------------------------------------------------
  # Gate qualité : lint + typecheck + tests. Rien ne se déploie si ça échoue.
  quality:
    name: Lint, typecheck & tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Tests
        run: npm test

      # Le build Next tourne sans DATABASE_URL (pool pg paresseux) —
      # attrape les erreurs « Failed to collect page data » avant le deploy.
      - name: Build
        run: npm run build

  # ---------------------------------------------------------------------------
  build:
    name: Build & push image
    needs: quality
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write     # nécessaire pour push sur ghcr.io
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to server
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key:      ${{ secrets.SSH_PRIVATE_KEY }}
          port:     ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -e
            cd /opt/ddm

            # Auth ghcr.io pour pull (le serveur a besoin de lire l'image)
            echo "${{ secrets.GHCR_PULL_TOKEN }}" | sudo docker login ghcr.io -u ${{ secrets.GHCR_USER || github.actor }} --password-stdin

            # Pull la nouvelle image puis restart
            sudo docker compose pull
            sudo docker compose up -d --remove-orphans
            sudo docker image prune -f

            # Vérifie que le container répond
            sleep 5
            sudo docker compose ps

            # Migration doc_counters (idempotente) : séquences atomiques de
            # numérotation. Le code a un fallback si la table manque, mais
            # l'appliquer ici ferme la fenêtre de course immédiatement.
            sudo docker compose exec -T app npx tsx scripts/database/apply-doc-counters.ts \
              || echo "⚠️ Migration doc_counters échouée — relancer : docker compose exec app npx tsx scripts/database/apply-doc-counters.ts"

            # Sync permissions ↔ code : insère les permissions nouvellement
            # déclarées et les attache aux rôles « accès total » (admin/pca).
            # Sans ça, une route protégée par une permission fraîchement
            # ajoutée renverrait 403 même à l'admin (permission fantôme).
            sudo docker compose exec -T app npx tsx scripts/database/sync-all-permissions.ts \
              || echo "⚠️ Sync permissions échouée — relancer : docker compose exec app npx tsx scripts/database/sync-all-permissions.ts"

            # Écritures comptables des ventes passées (idempotent) : génère
            # VT (D411/C701) + encaissements (D5xx/C411) manquants.
            sudo docker compose exec -T app npx tsx scripts/database/backfill-sale-entries.ts \
              || echo "⚠️ Backfill écritures ventes échoué — relancer : docker compose exec app npx tsx scripts/database/backfill-sale-entries.ts"

            echo "✅ Déploiement OK"
