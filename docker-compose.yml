# docker-compose pour le serveur de production.
# L'image vient de ghcr.io/miritie/ddm:latest construite par GitHub Actions.
# Les secrets viennent de /opt/ddm/.env (NE JAMAIS commiter ce fichier).

services:
  app:
    image: ghcr.io/miritie/ddm:latest
    container_name: ddm-app
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3001"   # exposé uniquement en local — nginx fait le proxy public
    env_file:
      - .env                     # /opt/ddm/.env sur le serveur
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/auth/login"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
